<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>逻辑导论 2026 Spring | Notes</title>
  <link rel="stylesheet" href="./style.css?v=20260310b" />
</head>
<body>
  <canvas id="bgLogicCanvas" class="bg-logic-canvas" aria-hidden="true"></canvas>

  <main class="shell">
    <header class="hero">
      <p class="hero-tag">Course Notes</p>
      <h1 class="hero-title">
        <span class="hero-title-main">逻辑导论</span>
        <span class="hero-title-sub">2026 Spring</span>
      </h1>
      <p class="hero-desc">本网站及全部内容均由 GPT-5.3-Codex 自动生成。</p>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>笔记列表</h2>      </div>
      <ul id="noteList" class="note-list"></ul>
    </section>
  </main>

  <script src="./background-elements.js?v=20260310b"></script>
  <script>
    const NOTES = [
      {
        id: "Lec1",
        titleZh: "Lec1 - 命题逻辑基础",
        titleEn: "Lec1 - Foundations of Propositional Logic",
        summaryZh: "命题、联结词、真值表与等价变换。",
        updated: "2026-03-10"
      },
      {
        id: "Lec2",
        titleZh: "Lec2 - 谓词逻辑与量词",
        titleEn: "Lec2 - Predicate Logic and Quantifiers",
        summaryZh: "量词作用域、形式化表达与推理示例。",
        updated: "2026-03-17"
      }
    ];

    const list = document.getElementById("noteList");
    NOTES.forEach((note, index) => {
      const item = document.createElement("li");
      item.className = "note-card";
      item.innerHTML = `
        <a class="note-main" href="./note.html?note=${encodeURIComponent(note.id)}&lang=zh">
          <div class="note-index">#${String(index + 1).padStart(2, "0")}</div>
          <div>
            <h3>${note.titleZh}</h3>
            <p>${note.summaryZh}</p>
            <p class="note-en">${note.titleEn}</p>
          </div>
          <div class="note-side">
            <div class="note-date">${note.updated}</div>
            <div class="note-lang-hint">ZH / EN</div>
          </div>
        </a>
      `;
      list.appendChild(item);
    });
  </script>
</body>
</html>
