<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>操作系统（实验班）2026 Spring | Notes</title>
  <link rel="stylesheet" href="./style.css?v=20260310b" />
</head>
<body>
  <div id="bgOsElements" class="bg-os-elements" aria-hidden="true">
    <div id="bgTerminalLayer" class="bg-terminal-layer"></div>
  </div>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>

  <main class="shell">
    <header class="hero">
      <p class="hero-tag">Course Notes</p>
      <h1 class="hero-title">
        <span class="hero-title-main">操作系统（实验班）</span>
        <span class="hero-title-sub">2026 Spring</span>
      </h1>
      <p class="hero-desc">本网站及全部内容均由 GPT-5.3-Codex 自动生成。</p>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>笔记列表</h2>
      </div>
      <ul id="noteList" class="note-list"></ul>
    </section>
  </main>

  <script src="./background-elements.js?v=20260310b"></script>
  <script>
    const NOTES = [
      {
        id: "Lec1",
        titleZh: "Lec1 - 什么是操作系统？",
        titleEn: "Lec1 - What Is an Operating System?",
        summaryZh: "操作系统的定义、进程抽象，以及现代系统挑战。",
        updated: "2026-03-03"
      },
      {
        id: "Lec2",
        titleZh: "Lec2 - 四个基础操作系统概念",
        titleEn: "Lec2 - Four Fundamental OS Concepts",
        summaryZh: "线程、地址空间、进程、双模式与基础保护机制。",
        updated: "2026-03-05"
      }
    ];

    const list = document.getElementById("noteList");
    NOTES.forEach((note, index) => {
      const item = document.createElement("li");
      item.className = "note-card";
      item.innerHTML = `
        <a class="note-main" href="./note.html?note=${encodeURIComponent(note.id)}&lang=zh">
          <div class="note-index">#${String(index + 1).padStart(2, "0")}</div>
          <div>
            <h3>${note.titleZh}</h3>
            <p>${note.summaryZh}</p>
            <p class="note-en">${note.titleEn}</p>
          </div>
          <div class="note-side">
            <div class="note-date">${note.updated}</div>
            <div class="note-lang-hint">ZH / EN</div>
          </div>
        </a>
      `;
      list.appendChild(item);
    });
  </script>
</body>
</html>
